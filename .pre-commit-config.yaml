# Local hooks via uv so versions always match the project's pinned toolchain.
# Install with: uv run --extra dev pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --extra dev ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run --extra dev ruff format
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run --extra dev mypy src
        language: system
        types: [python]
        pass_filenames: false
